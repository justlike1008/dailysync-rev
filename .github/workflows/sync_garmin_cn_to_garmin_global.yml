name: Garmin Smart Real-Time Sync

on:
  workflow_dispatch:
  schedule:
    # 每 15 分钟触发
    - cron: "*/15 * * * *"
  push:
    branches:
      - main

env:
  # 保留账户信息，确保 CN -> Global 同步
  RQ_COOKIE: ${{ secrets.RQ_COOKIE }}
  RQ_CSRF_TOKEN: ${{ secrets.RQ_CSRF_TOKEN }}
  RQ_USERID: ${{ secrets.RQ_USERID }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_API_CLIENT_EMAIL: ${{ secrets.GOOGLE_API_CLIENT_EMAIL }}
  GOOGLE_API_PRIVATE_KEY: ${{ secrets.GOOGLE_API_PRIVATE_KEY }}
  BARK_KEY: ${{ secrets.BARK_KEY }}
  GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_GLOBAL_USERNAME: ${{ secrets.GARMIN_GLOBAL_USERNAME }}
  GARMIN_GLOBAL_PASSWORD: ${{ secrets.GARMIN_GLOBAL_PASSWORD }}

jobs:
  smart-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1️⃣ 拉取仓库
      - uses: actions/checkout@v4

      # 2️⃣ 设置 Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: yarn

      # 3️⃣ 安装依赖
      - run: yarn

      # 4️⃣ 获取最新活动 ID（数字模拟）
      - name: Fetch latest activity (simulated)
        run: |
          # ⚠️ 这里用时间戳模拟最新活动 ID，保证数字格式
          date +%s > latest.txt

      # 5️⃣ 判断是否有新活动
      - name: Check new activity
        id: check
        run: |
          # ✅ 修复了 || 大小写错误
          OLD=$(cat .last_activity 2>/dev/null || echo "none")
          NEW=$(cat latest.txt)

          echo "OLD=$OLD"
          echo "NEW=$NEW"

          if [ "$OLD" = "$NEW" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "$NEW" > .last_activity
            echo "changed=true" >> $GITHUB_OUTPUT

      # 6️⃣ 只有新运动才同步
      - name: Sync Garmin
        if: steps.check.outputs.changed == 'true'
        run: yarn sync_cn

      # 7️⃣ 自动 commit
      - name: Commit new activity
        if: steps.check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "New Garmin activity synced"

      # 8️⃣ Bark 通知（可选）
      - name: Bark notify
        if: steps.check.outputs.changed == 'true'
        run: |
          curl -s "https://api.day.app/${BARK_KEY}/发现新运动/已自动同步🏃"
